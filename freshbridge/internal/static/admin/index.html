<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鲜桥 · 内控后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0FDF4;color:#14532D;min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh}
.login-box{background:#fff;padding:48rpx 40rpx;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08);width:380px;text-align:center}
.login-box h1{font-size:24px;margin-bottom:8px;color:#14532D}
.login-box p{color:#999;margin-bottom:24px;font-size:14px}
.login-box input{width:100%;padding:12px 16px;border:1px solid #E5E7EB;border-radius:8px;font-size:15px;margin-bottom:16px;outline:none}
.login-box input:focus{border-color:#15803D}
.login-box button{width:100%;padding:12px;background:#15803D;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:600}
.login-box button:hover{background:#166534}
.login-error{color:#EF4444;font-size:13px;margin-top:8px;display:none}

/* rpx → px approximate for desktop */
.app{display:none}
.app.active{display:flex;min-height:100vh}
.sidebar{width:220px;background:#14532D;color:#fff;padding:24px 0;flex-shrink:0}
.sidebar h2{padding:0 20px;font-size:18px;margin-bottom:32px;color:#86EFAC}
.nav-item{padding:14px 20px;cursor:pointer;font-size:15px;transition:background .15s;display:flex;align-items:center;gap:8px}
.nav-item:hover{background:rgba(255,255,255,0.1)}
.nav-item.active{background:rgba(255,255,255,0.15);border-right:3px solid #86EFAC}
.main{flex:1;padding:32px;overflow-y:auto}
.main h1{font-size:24px;margin-bottom:24px}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.stat-card .num{font-size:32px;font-weight:700;color:#14532D}
.stat-card .label{font-size:14px;color:#999;margin-top:4px}
.stat-card.green .num{color:#15803D}

.panel{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.04);display:none}
.panel.active{display:block}

table{width:100%;border-collapse:collapse}
th,td{padding:12px 16px;text-align:left;border-bottom:1px solid #F0FDF4;font-size:14px}
th{font-weight:600;color:#15803D;font-size:13px;text-transform:uppercase}
tr:hover{background:#FAFAFA}

.badge{padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600}
.badge-pending{background:#FEF3C7;color:#92400E}
.badge-paid{background:#DBEAFE;color:#1E40AF}
.badge-shipped{background:#EDE9FE;color:#5B21B6}
.badge-completed{background:#DCFCE7;color:#166534}
.badge-cancelled{background:#FEE2E2;color:#991B1B}
.badge-on{background:#DCFCE7;color:#166534}
.badge-off{background:#FEE2E2;color:#991B1B}

.btn{padding:6px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500}
.btn-sm{padding:4px 12px;font-size:12px}
.btn-green{background:#15803D;color:#fff}
.btn-red{background:#EF4444;color:#fff}
.btn-outline{border:1px solid #15803D;color:#15803D;background:transparent}
.btn-outline:hover{background:#F0FDF4}

.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.top-bar input,.top-bar select{padding:8px 12px;border:1px solid #E5E7EB;border-radius:6px;font-size:14px;outline:none}
.top-bar input:focus,.top-bar select:focus{border-color:#15803D}

.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:12px;padding:32px;width:480px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.15)}
.modal h3{font-size:20px;margin-bottom:20px;color:#14532D}
.modal label{display:block;font-size:13px;color:#666;margin-bottom:4px;margin-top:12px}
.modal input,.modal textarea,.modal select{width:100%;padding:10px 12px;border:1px solid #E5E7EB;border-radius:6px;font-size:14px;outline:none;margin-bottom:8px}
.modal textarea{resize:vertical;min-height:60px}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:#15803D}
.modal-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:20px}
.modal-actions button{padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none}

.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:#14532D;color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:200;display:none}
.toast.show{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.spinner{text-align:center;padding:40px;color:#999}
</style>
</head>
<body>

<!-- Login -->
<div id="loginWrap" class="login-wrap">
  <div class="login-box">
    <h1>🍃 鲜桥内控</h1>
    <p>管理后台 · 请登录</p>
    <input id="tokenInput" type="password" placeholder="Admin Token" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">登 录</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<!-- App -->
<div id="app" class="app">
  <nav class="sidebar">
    <h2>🍃 鲜桥内控</h2>
    <div class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard')">📊 仪表盘</div>
    <div class="nav-item" data-tab="users" onclick="switchTab('users')">👥 用户管理</div>
    <div class="nav-item" data-tab="orders" onclick="switchTab('orders')">📦 商城订单</div>
    <div class="nav-item" data-tab="products" onclick="switchTab('products')">🛍️ 商品管理</div>
    <div class="nav-item" onclick="logout()" style="margin-top:auto;color:#FCA5A5">🚪 退出</div>
  </nav>
  <div class="main">
    <div id="dashboardPanel" class="panel active">
      <h1>仪表盘</h1>
      <div id="statsGrid" class="stats-grid"></div>
      <div style="color:#999;font-size:13px">* 基础统计概览，更多功能持续扩展中</div>
    </div>
    <div id="usersPanel" class="panel">
      <h1>用户管理</h1>
      <div id="usersTable"></div>
    </div>
    <div id="ordersPanel" class="panel">
      <h1>商城订单</h1>
      <div class="top-bar">
        <select id="orderFilter" onchange="loadOrders()">
          <option value="">全部状态</option>
          <option value="pending">待支付</option>
          <option value="paid">已支付</option>
          <option value="shipped">已发货</option>
          <option value="completed">已完成</option>
          <option value="cancelled">已取消</option>
        </select>
      </div>
      <div id="ordersTable"></div>
    </div>
    <div id="productsPanel" class="panel">
      <h1>商品管理</h1>
      <div class="top-bar">
        <div></div>
        <button class="btn btn-green" onclick="openProductModal()">+ 新增商品</button>
      </div>
      <div id="productsTable"></div>
    </div>
  </div>
</div>

<!-- Product edit modal -->
<div id="productModal" class="modal-overlay" onclick="if(event.target===this)closeProductModal()">
  <div class="modal">
    <h3 id="productModalTitle">新增商品</h3>
    <input type="hidden" id="prodId">
    <label>商品名称</label><input id="prodName" placeholder="如：红富士苹果 5斤装">
    <label>描述</label><textarea id="prodDesc" placeholder="商品描述..."></textarea>
    <label>售价 (¥)</label><input id="prodPrice" type="number" step="0.01" placeholder="49.90">
    <label>原价 (¥)</label><input id="prodOrigPrice" type="number" step="0.01" placeholder="69.90">
    <label>分类</label><select id="prodCat"><option value="fruit">鲜果</option><option value="gift">礼盒</option><option value="other">其他</option></select>
    <label>库存</label><input id="prodStock" type="number" placeholder="100">
    <label>排序</label><input id="prodSort" type="number" placeholder="0">
    <label>图片URL</label><input id="prodImage" placeholder="https://...">
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeProductModal()">取消</button>
      <button class="btn btn-green" onclick="saveProduct()">保存</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
let token = localStorage.getItem('admin_token') || '';

function api(method, path, body) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  return fetch('/admin-api' + path, opts).then(r => {
    if (r.status === 401) { logout(); throw new Error('unauthorized'); }
    return r.json();
  });
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Auth
function login() {
  const v = document.getElementById('tokenInput').value.trim();
  if (!v) return;
  token = v;
  // Verify token by calling dashboard
  api('GET', '/dashboard').then(d => {
    localStorage.setItem('admin_token', token);
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('app').classList.add('active');
    renderDashboard(d);
  }).catch(() => {
    token = '';
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginError').textContent = 'Token 错误，请重试';
  });
}

function logout() {
  token = '';
  localStorage.removeItem('admin_token');
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('app').classList.remove('active');
}

// Auto-login
if (token) {
  api('GET', '/dashboard').then(d => {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('app').classList.add('active');
    renderDashboard(d);
  }).catch(() => { token = ''; });
}

// Tabs
function switchTab(name) {
  document.querySelectorAll('.nav-item[data-tab]').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(name + 'Panel').classList.add('active');
  if (name === 'dashboard') loadDashboard();
  else if (name === 'users') loadUsers();
  else if (name === 'orders') loadOrders();
  else if (name === 'products') loadProducts();
}

// Dashboard
function loadDashboard() {
  api('GET', '/dashboard').then(renderDashboard);
}

function renderDashboard(d) {
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="num">${d.user_count}</div><div class="label">注册用户</div></div>
    <div class="stat-card"><div class="num">${d.product_count}</div><div class="label">货源发布</div></div>
    <div class="stat-card green"><div class="num">${d.order_count}</div><div class="label">商城订单</div></div>
    <div class="stat-card green"><div class="num">¥${Number(d.order_revenue).toFixed(0)}</div><div class="label">订单营收</div></div>
    <div class="stat-card"><div class="num">${d.market_count}</div><div class="label">行情数据</div></div>
  `;
}

// Users
function loadUsers() {
  api('GET', '/users').then(d => {
    const rows = d.users.map(u => `
      <tr>
        <td>${u.id}</td>
        <td>${u.nickname || '-'}</td>
        <td>${u.phone || '-'}</td>
        <td>${u.role}</td>
        <td>${u.origin_province}${u.origin_city}</td>
        <td>${u.verified ? '<span class="badge badge-on">已认证</span>' : '<span class="badge badge-off">未认证</span>'}</td>
        <td>${u.created_at.slice(0,10)}</td>
      </tr>
    `).join('');
    document.getElementById('usersTable').innerHTML = `
      <table><thead><tr><th>ID</th><th>昵称</th><th>手机</th><th>角色</th><th>产地</th><th>认证</th><th>注册时间</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="7" style="text-align:center;color:#999">暂无数据</td></tr>'}</tbody></table>
    `;
  });
}

// Orders
function loadOrders() {
  const status = document.getElementById('orderFilter').value;
  api('GET', '/orders?status=' + status).then(d => {
    const rows = d.orders.map(o => `
      <tr>
        <td>${o.order_no}</td>
        <td>¥${o.total_amount.toFixed(2)}</td>
        <td><span class="badge badge-${o.status}">${statusMap[o.status]}</span></td>
        <td>${o.receiver_name} ${o.receiver_phone}</td>
        <td>${o.created_at.slice(0,16).replace('T',' ')}</td>
        <td>
          ${o.status === 'pending' ? `<button class="btn btn-green btn-sm" onclick="updateOrderStatus(${o.id},'paid')">标记已付</button>` : ''}
          ${o.status === 'paid' ? `<button class="btn btn-green btn-sm" onclick="updateOrderStatus(${o.id},'shipped')">标记发货</button>` : ''}
          ${o.status === 'shipped' ? `<button class="btn btn-green btn-sm" onclick="updateOrderStatus(${o.id},'completed')">标记完成</button>` : ''}
        </td>
      </tr>
    `).join('');
    document.getElementById('ordersTable').innerHTML = `
      <table><thead><tr><th>订单号</th><th>金额</th><th>状态</th><th>收货人</th><th>时间</th><th>操作</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="6" style="text-align:center;color:#999">暂无数据</td></tr>'}</tbody></table>
    `;
  });
}

const statusMap = {pending:'待支付',paid:'已支付',shipped:'已发货',completed:'已完成',cancelled:'已取消'};

function updateOrderStatus(id, status) {
  api('PUT', '/orders/' + id, {status}).then(() => { toast('订单状态已更新'); loadOrders(); });
}

// Products
function loadProducts() {
  api('GET', '/products').then(d => {
    const rows = d.products.map(p => `
      <tr>
        <td>${p.id}</td>
        <td>${p.name}</td>
        <td>¥${p.price.toFixed(2)}</td>
        <td>${p.category}</td>
        <td>${p.stock}</td>
        <td>${p.sales}</td>
        <td>${p.status ? '<span class="badge badge-on">上架</span>' : '<span class="badge badge-off">下架</span>'}</td>
        <td>
          <button class="btn btn-outline btn-sm" onclick="editProduct(${p.id})">编辑</button>
          <button class="btn ${p.status ? 'btn-red' : 'btn-green'} btn-sm" onclick="toggleProduct(${p.id},${p.status ? 0 : 1})">${p.status ? '下架' : '上架'}</button>
        </td>
      </tr>
    `).join('');
    document.getElementById('productsTable').innerHTML = `
      <table><thead><tr><th>ID</th><th>名称</th><th>售价</th><th>分类</th><th>库存</th><th>销量</th><th>状态</th><th>操作</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="8" style="text-align:center;color:#999">暂无数据</td></tr>'}</tbody></table>
    `;
  });
}

function toggleProduct(id, status) {
  api('PUT', '/products/' + id + '/status', {status}).then(() => { toast(status ? '已上架' : '已下架'); loadProducts(); });
}

function openProductModal(p) {
  document.getElementById('productModal').classList.add('active');
  if (p) {
    document.getElementById('productModalTitle').textContent = '编辑商品';
    document.getElementById('prodId').value = p.id;
    document.getElementById('prodName').value = p.name;
    document.getElementById('prodDesc').value = p.description || '';
    document.getElementById('prodPrice').value = p.price;
    document.getElementById('prodOrigPrice').value = p.original_price;
    document.getElementById('prodCat').value = p.category;
    document.getElementById('prodStock').value = p.stock;
    document.getElementById('prodSort').value = p.sort_order;
    document.getElementById('prodImage').value = p.image_url || '';
  } else {
    document.getElementById('productModalTitle').textContent = '新增商品';
    ['prodId','prodName','prodDesc','prodPrice','prodOrigPrice','prodStock','prodSort','prodImage'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('prodCat').value = 'fruit';
  }
}

function closeProductModal() { document.getElementById('productModal').classList.remove('active'); }

function saveProduct() {
  const id = document.getElementById('prodId').value;
  const data = {
    name: document.getElementById('prodName').value,
    description: document.getElementById('prodDesc').value,
    price: parseFloat(document.getElementById('prodPrice').value) || 0,
    original_price: parseFloat(document.getElementById('prodOrigPrice').value) || 0,
    category: document.getElementById('prodCat').value,
    stock: parseInt(document.getElementById('prodStock').value) || 0,
    sort_order: parseInt(document.getElementById('prodSort').value) || 0,
    image_url: document.getElementById('prodImage').value,
    status: 1
  };
  if (!data.name) { toast('请输入商品名称'); return; }
  const method = id ? 'PUT' : 'POST';
  const path = id ? '/products/' + id : '/products';
  api(method, path, data).then(() => { closeProductModal(); toast(id ? '已更新' : '已创建'); loadProducts(); });
}

function editProduct(id) {
  api('GET', '/products').then(d => {
    const p = d.products.find(x => x.id === id);
    if (p) openProductModal(p);
  });
}
</script>
</body>
</html>
