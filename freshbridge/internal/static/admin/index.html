<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>鲜桥 Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,PingFang SC,Microsoft YaHei,sans-serif;background:#F5F5F5;display:flex;min-height:100vh}
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,#0F3B2C,#1A5C3E);display:flex;align-items:center;justify-content:center;z-index:999}
.login-card{background:#fff;border-radius:16px;padding:48px 40px;width:400px;box-shadow:0 8px 40px rgba(0,0,0,.15);text-align:center}
.login-card h1{font-size:28px;color:#0F3B2C;margin-bottom:8px}
.login-card p{color:#6B7280;margin-bottom:32px;font-size:14px}
.login-card input{width:100%;padding:14px 16px;border:1px solid #E5E7EB;border-radius:10px;font-size:16px;margin-bottom:16px;outline:none}
.login-card input:focus{border-color:#0F3B2C}
.login-card button{width:100%;padding:14px;background:#0F3B2C;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.login-card .err{color:#DC2626;font-size:14px;margin-top:8px}
#app{display:none;width:100%}
#app.active{display:flex}
.sidebar{width:220px;background:#0F3B2C;color:#fff;padding:20px 0;min-height:100vh;flex-shrink:0}
.sidebar h2{padding:0 20px 24px;font-size:20px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:8px}
.sidebar a{display:flex;align-items:center;gap:10px;padding:14px 20px;color:rgba(255,255,255,.7);text-decoration:none;font-size:14px;cursor:pointer;transition:all .2s}
.sidebar a:hover,.sidebar a.active{background:#1A5C3E;color:#fff}
.main{flex:1;padding:24px;overflow-y:auto}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.topbar h3{font-size:22px;color:#1A1A1A}
.topbar .logout{color:#DC2626;cursor:pointer;font-size:14px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.stat-card .v{font-size:32px;font-weight:700;color:#0F3B2C}
.stat-card .l{font-size:14px;color:#6B7280;margin-top:4px}
.stat-card.warn .v{color:#D97706}.stat-card.danger .v{color:#DC2626}
.panel{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:24px}
.panel h4{font-size:18px;color:#1A1A1A;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #F5F5F5}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:12px 8px;background:#F5F5F5;color:#6B7280;font-weight:600;border-radius:4px}
td{padding:12px 8px;border-bottom:1px solid #F0F0F0}
tr:hover td{background:#FAFAFA}
.btn{padding:6px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;margin:2px}
.btn-green{background:#0F3B2C;color:#fff}.btn-orange{background:#F5A623;color:#fff}.btn-red{background:#DC2626;color:#fff}
.btn-outline{background:#fff;color:#6B7280;border:1px solid #E5E7EB}
.badge{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-green{background:#DCFCE7;color:#16A34A}.badge-orange{background:#FEF3C7;color:#D97706}
.badge-red{background:#FEE2E2;color:#DC2626}.badge-blue{background:#DBEAFE;color:#2563EB}.badge-gold{background:#FFDEA4;color:#5A4312}
.search-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-row select,.search-row input{padding:8px 12px;border:1px solid #E5E7EB;border-radius:8px;font-size:14px;outline:none}
.toggle-switch{position:relative;display:inline-block;width:48px;height:26px}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#E5E7EB;border-radius:26px;transition:.3s}
.toggle-slider:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.toggle-slider{background:#0F3B2C}
input:checked+.toggle-slider:before{transform:translateX(22px)}
.flex-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.img-preview{max-width:200px;max-height:120px;border-radius:8px;margin:8px 0}
</style>
</head>
<body>

<div id="loginScreen">
<div class="login-card">
<h1>🍃 鲜桥 Admin</h1><p>农产品批发后台管理系统</p>
<input id="uname" placeholder="账号" value="admin">
<input id="upass" type="password" placeholder="密码" value="freshbridge@2026">
<button onclick="login()">登 录</button>
<div id="loginErr" class="err"></div>
</div>
</div>

<div id="app">
<div class="sidebar">
<h2>🍃 鲜桥后台</h2>
<a class="active" data-page="dashboard" onclick="nav(this,'dashboard')">📊 仪表盘</a>
<a data-page="users" onclick="nav(this,'users')">👥 用户管理</a>
<a data-page="posts" onclick="nav(this,'posts')">📦 帖子审核</a>
<a data-page="prices" onclick="nav(this,'prices')">📈 行情管理</a>
<a data-page="announce" onclick="nav(this,'announce')">🔔 资讯公告</a>
<a data-page="banners" onclick="nav(this,'banners')">🖼️ Banner管理</a>
<a data-page="modules" onclick="nav(this,'modules')">⚙️ 模块开关</a>
</div>
<div class="main">
<div class="topbar"><h3 id="pageTitle">数据仪表盘</h3><span class="logout" onclick="logout()">退出登录</span></div>
<div id="pageContent"></div>
</div>
</div>

<script>
const API='/admin-api';let token=localStorage.getItem('fb_admin_token')||'';

async function login(){
  const u=document.getElementById('uname').value,p=document.getElementById('upass').value;
  const res=await fetch(API+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})}).catch(()=>null);
  if(!res||!res.ok){document.getElementById('loginErr').textContent='账号或密码错误';return}
  const d=await res.json();token=d.token;localStorage.setItem('fb_admin_token',token);
  document.getElementById('loginScreen').style.display='none';document.getElementById('app').classList.add('active');
  nav(document.querySelector('.sidebar a[data-page="dashboard"]'),'dashboard');
}
function logout(){token='';localStorage.removeItem('fb_admin_token');location.reload();}
if(token){document.getElementById('loginScreen').style.display='none';document.getElementById('app').classList.add('active');
  nav(document.querySelector('.sidebar a[data-page="dashboard"]'),'dashboard');}

function nav(el,page){
  document.querySelectorAll('.sidebar a').forEach(a=>a.classList.remove('active'));el.classList.add('active');
  document.getElementById('pageTitle').textContent=el.textContent.trim();
  const pages={dashboard:renderDashboard,users:renderUsers,posts:renderPosts,prices:renderPrices,announce:renderAnnounce,banners:renderBanners,modules:renderModules};
  if(pages[page])pages[page]();
}

async function api(path,opts={}){
  const h={'Authorization':'Bearer '+token};if(!opts.body||opts.body instanceof FormData)delete h['Content-Type'];else h['Content-Type']='application/json';
  const res=await fetch(API+path,{headers:h,...opts}).catch(()=>null);
  if(!res||res.status===401){logout();return null}return res.json();
}

// ===== Dashboard =====
async function renderDashboard(){
  const d=await api('/dashboard-v2')||{};
  document.getElementById('pageContent').innerHTML=`
    <div class="stats">
      <div class="stat-card"><div class="v">${d.user_count||0}</div><div class="l">总用户数</div></div>
      <div class="stat-card"><div class="v">${d.post_count||0}</div><div class="l">总帖子数</div></div>
      <div class="stat-card warn"><div class="v">${d.pending_posts||0}</div><div class="l">待审核帖子</div></div>
      <div class="stat-card danger"><div class="v">${d.pending_auths||0}</div><div class="l">待认证用户</div></div>
    </div>
    <div class="panel"><h4>快捷操作</h4>
      <button class="btn btn-green" onclick="nav(document.querySelector('.sidebar a[data-page=\"posts\"]'),'posts')">审核待处理帖子</button>
      <button class="btn btn-orange" onclick="nav(document.querySelector('.sidebar a[data-page=\"banners\"]'),'banners')">管理Banner</button>
      <button class="btn btn-outline" onclick="nav(document.querySelector('.sidebar a[data-page=\"modules\"]'),'modules')">首页模块开关</button>
    </div>`;
}

// ===== Users =====
async function renderUsers(){
  const d=await api('/users-v2?page_size=50')||{};
  const rows=(d.users||[]).map(u=>`<tr><td>${u.id}</td><td>${u.phone||'--'}</td><td><span class="badge ${u.role==='farmer'?'badge-green':'badge-blue'}">${u.role==='farmer'?'农户':'采购商'}</span></td><td><span class="badge ${u.verified?'badge-green':'badge-orange'}">${u.verified?'已认证':'未认证'}</span></td><td>${u.created_at?.slice(0,10)||'--'}</td><td><button class="btn btn-green" onclick="verifyUser(${u.id},1)">认证</button><button class="btn btn-red" onclick="verifyUser(${u.id},0)">取消</button></td></tr>`).join('');
  document.getElementById('pageContent').innerHTML=`<div class="panel"><h4>用户列表 (${d.total||0})</h4><table><thead><tr><th>ID</th><th>手机号</th><th>角色</th><th>认证</th><th>时间</th><th>操作</th></tr></thead><tbody>${rows||'<tr><td colspan="6">无数据</td></tr>'}</tbody></table></div>`;
}
async function verifyUser(id,v){if(!confirm('确定？'))return;await api('/users-v2/'+id,{method:'PUT',body:JSON.stringify({verified:v})});renderUsers();}

// ===== Posts =====
async function renderPosts(status=''){
  const d=await api('/square-posts?status='+status+'&page_size=50')||{};
  const rows=(d.posts||[]).map(p=>`<tr><td>${p.id}</td><td>${p.user_name||'--'}</td><td><span class="badge ${p.type==='supply'?'badge-green':'badge-orange'}">${p.type==='supply'?'供货':'求购'}</span></td><td>${(p.description||'').substring(0,30)}</td><td><span class="badge ${p.status===1?'badge-green':p.status===2?'badge-red':'badge-orange'}">${p.status===1?'已通过':p.status===2?'已驳回':'待审核'}</span></td><td>${p.is_pinned?'<span class="badge badge-gold">置顶</span> ':''}${p.created_at?.slice(0,10)}</td><td><button class="btn btn-green" onclick="approvePost(${p.id})">通过</button><button class="btn btn-red" onclick="rejectPost(${p.id})">驳回</button><button class="btn btn-outline" onclick="pinPost(${p.id})">${p.is_pinned?'取消置顶':'置顶'}</button></td></tr>`).join('');
  document.getElementById('pageContent').innerHTML=`<div class="panel"><h4>帖子审核</h4><div class="search-row"><select onchange="renderPosts(this.value)"><option value="">全部</option><option value="0">待审核</option><option value="1">已通过</option><option value="2">已驳回</option></select></div><table><thead><tr><th>ID</th><th>发布人</th><th>类型</th><th>内容</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody>${rows||'<tr><td colspan="7">无数据</td></tr>'}</tbody></table></div>`;
}
async function approvePost(id){if(!confirm('确认通过？'))return;await api('/square-posts/'+id+'/approve',{method:'PUT'});renderPosts();}
async function rejectPost(id){const r=prompt('驳回理由：');if(!r)return;await api('/square-posts/'+id+'/reject',{method:'PUT',body:JSON.stringify({reason:r})});renderPosts();}
async function pinPost(id){await api('/square-posts/'+id+'/pin',{method:'PUT'});renderPosts();}

// ===== Prices =====
async function renderPrices(){
  const d=await api('/market-prices?page_size=50')||{};
  const rows=(d.prices||[]).map(p=>`<tr><td>${p.id}</td><td>${p.variety}</td><td>${p.market_name}</td><td>¥${p.price?.toFixed(2)}</td><td><span class="${p.change_pct>=0?'badge-red':'badge-green'}">${p.change_pct>=0?'▲':'▼'}${Math.abs(p.change_pct)?.toFixed(1)}%</span></td><td>${p.record_date?.slice(0,10)}</td></tr>`).join('');
  document.getElementById('pageContent').innerHTML=`<div class="panel"><h4>行情价格 (${d.total||0}条)</h4><table><thead><tr><th>ID</th><th>品种</th><th>市场</th><th>价格</th><th>涨跌</th><th>日期</th></tr></thead><tbody>${rows||'<tr><td colspan="6">无数据</td></tr>'}</tbody></table></div>`;
}

// ===== Announcements =====
async function renderAnnounce(){
  const d=await api('/announcements')||{};
  const rows=(d.announcements||[]).map(a=>`<tr><td>${a.id}</td><td>${a.title}</td><td><span class="badge ${a.type==='market'?'badge-red':'badge-blue'}">${a.type==='market'?'行情':'公告'}</span></td><td>${a.is_pinned?'<span class="badge badge-gold">置顶</span>':''}</td><td>${a.created_at?.slice(0,10)}</td><td><button class="btn btn-red" onclick="delAnnounce(${a.id})">删除</button></td></tr>`).join('');
  document.getElementById('pageContent').innerHTML=`<div class="panel"><h4>资讯公告</h4><button class="btn btn-green" onclick="addAnnounce()">+ 新增公告</button><table style="margin-top:16px"><thead><tr><th>ID</th><th>标题</th><th>类型</th><th>置顶</th><th>时间</th><th>操作</th></tr></thead><tbody>${rows||'<tr><td colspan="6">无数据</td></tr>'}</tbody></table></div>`;
}
async function addAnnounce(){
  const t=prompt('标题：'),c=prompt('内容：');if(!t||!c)return;
  await api('/announcements',{method:'POST',body:JSON.stringify({title:t,content:c,type:'notice',is_pinned:0,status:1})});renderAnnounce();
}
async function delAnnounce(id){if(!confirm('确定删除？'))return;await api('/announcements/'+id,{method:'DELETE'});renderAnnounce();}

// ===== Banners =====
async function renderBanners(){
  const d=await api('/banners')||{};
  const rows=(d.banners||[]).map(b=>`<tr><td>${b.id}</td><td>${b.title}</td><td><img src="${b.image_url}" class="img-preview" onerror="this.style.display='none'"></td><td>${b.sort_order}</td><td><button class="btn btn-red" onclick="delBanner(${b.id})">删除</button></td></tr>`).join('');
  document.getElementById('pageContent').innerHTML=`<div class="panel"><h4>Banner 管理</h4>
    <button class="btn btn-green" onclick="showBannerForm()">+ 新增 Banner</button>
    <div id="bannerForm" style="display:none;margin:16px 0;padding:16px;background:#FAFAFA;border-radius:8px">
      <input id="bfTitle" placeholder="标题" style="width:100%;margin-bottom:8px"><br>
      <input id="bfLink" placeholder="跳转链接" style="width:100%;margin-bottom:8px"><br>
      <input type="file" id="bfFile" accept="image/*" style="margin-bottom:8px"><br>
      <div id="bfPreview"></div>
      <button class="btn btn-green" onclick="addBanner()">提交</button><button class="btn btn-outline" onclick="document.getElementById('bannerForm').style.display='none'">取消</button>
    </div>
    <table style="margin-top:16px"><thead><tr><th>ID</th><th>标题</th><th>预览</th><th>排序</th><th>操作</th></tr></thead><tbody>${rows||'<tr><td colspan="5">无数据</td></tr>'}</tbody></table></div>`;
}
function showBannerForm(){document.getElementById('bannerForm').style.display='block'}
async function addBanner(){
  const title=document.getElementById('bfTitle').value,link=document.getElementById('bfLink').value;
  const file=document.getElementById('bfFile').files[0];
  if(!file){alert('请选择图片');return}
  const fd=new FormData();fd.append('file',file);fd.append('category','banners');
  const upRes=await api('/upload',{method:'POST',body:fd});
  if(!upRes||!upRes.url){alert('上传失败');return}
  await api('/banners',{method:'POST',body:JSON.stringify({title,image_url:upRes.url,link_url:link,sort_order:0,status:1})});
  document.getElementById('bannerForm').style.display='none';renderBanners();
}
async function delBanner(id){if(!confirm('确定删除？'))return;await api('/banners/'+id,{method:'DELETE'});renderBanners();}

// ===== Module Toggles =====
async function renderModules(){
  const d=await api('/site-config')||{};const configs=d.configs||[];
  const toggles=configs.filter(c=>c.config_key.startsWith('home_')).map(c=>`<div class="flex-row" style="padding:12px 0;border-bottom:1px solid #F0F0F0"><div><strong>${c.config_key}</strong><br><small style="color:#6B7280">${c.description}</small></div><label class="toggle-switch"><input type="checkbox" ${c.config_value==='true'?'checked':''} onchange="toggleModule('${c.config_key}',this.checked)"><span class="toggle-slider"></span></label></div>`).join('');
  document.getElementById('pageContent').innerHTML=`
    <div class="panel"><h4>首页模块开关</h4><p style="color:#6B7280;margin-bottom:16px">控制小程序首页各模块显示/隐藏，修改即时生效</p>${toggles}</div>
    <div class="panel"><h4>Banner 内容配置</h4><p style="color:#6B7280;margin-bottom:16px">修改首页轮播图文字内容</p>
      ${['banner_1','banner_2','banner_3'].map(k=>{
        const t=configs.find(c=>c.config_key===k+'_title')?.config_value||'';
        const s=configs.find(c=>c.config_key===k+'_sub')?.config_value||'';
        const img=configs.find(c=>c.config_key===k+'_img')?.config_value||'';
        return `<div style="padding:8px 0;border-bottom:1px solid #F0F0F0"><strong>${k}</strong>
          <div class="flex-row"><input value="${t}" id="${k}_title" placeholder="标题" style="flex:1"><input value="${s}" id="${k}_sub" placeholder="副标题" style="flex:1"><button class="btn btn-green" onclick="saveBannerConfig('${k}')">保存</button></div>
          <div class="flex-row"><input value="${img}" id="${k}_img" placeholder="图片URL" style="flex:1"></div></div>`;
      }).join('')}
    </div>`;
}
async function toggleModule(key,val){await api('/site-config',{method:'PUT',body:JSON.stringify({key,value:val?'true':'false'})})}
async function saveBannerConfig(k){
  await api('/site-config',{method:'PUT',body:JSON.stringify({key:k+'_title',value:document.getElementById(k+'_title').value})});
  await api('/site-config',{method:'PUT',body:JSON.stringify({key:k+'_sub',value:document.getElementById(k+'_sub').value})});
  await api('/site-config',{method:'PUT',body:JSON.stringify({key:k+'_img',value:document.getElementById(k+'_img').value})});
  alert('Banner 配置已保存');
}
</script>
</body></html>
