# Optional: Nginx reverse proxy for HTTPS + caching
# The Go binary already serves frontend + API on :8080
# Use this if you need HTTPS, gzip, or CDN caching

server {
    listen 80;
    server_name _;

    # Proxy everything to Go backend (which serves both API and frontend)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location /assets/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_cache static_cache;
        proxy_cache_valid 200 30d;
        add_header X-Cache-Status $upstream_cache_status;
    }
}
