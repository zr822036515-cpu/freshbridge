<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>达人邀约助手</title><link rel="stylesheet" href="popup.css"></head>
<body>
<div class="app">
  <header>
    <h1>🔥 精选联盟达人邀约助手</h1>
    <div class="stats">
      <div class="stat-item"><span class="stat-val" id="s1">0</span><span class="stat-lbl">今日邀约</span></div>
      <div class="stat-item"><span class="stat-val" id="s2">0</span><span class="stat-lbl">成功</span></div>
      <div class="stat-item"><span class="stat-val" id="s3">0</span><span class="stat-lbl">失败</span></div>
    </div>
  </header>
  <div class="body">
    <button class="btn primary full" id="open-panel">📊 打开完整面板</button>
    <div class="section-title">🕐 最近活动</div>
    <div id="recent-activity"><span class="muted">暂无记录</span></div>
  </div>
  <footer><span id="status">✅ 就绪</span></footer>
</div>
<script type="module" src="popup.js"></script>
</body>
</html>
